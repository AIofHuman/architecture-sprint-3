name: PlantUML Diagrams

on:
  push:
    branches:
      - warmhouse
  pull_request:
    branches:
      - main

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Graphviz
      run: sudo apt-get install -y graphviz

    - name: Download PlantUML
      run: wget -O plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2023.12/plantuml-1.2023.12.jar

    - name: Generate Diagrams
      run: |
        echo "Running PlantUML..."
        mkdir -p diagrams/{context,container,component,code}
        java -jar plantuml.jar -verbose diagrams/context/*.puml
        java -jar plantuml.jar -verbose diagrams/container/*.puml
        java -jar plantuml.jar -verbose diagrams/component/*.puml
        java -jar plantuml.jar -verbose diagrams/code/*.puml
        java -jar plantuml.jar -verbose diagrams/ER/*.puml
    
    - name: Commit Diagrams
      run: |
        git config --local user.email "demkov.boris@gmail.com"
        git config --local user.name "AIofHuman"
        git add diagrams/**/*.png
        git commit -m "Automated diagram generation"
        git push origin warmhouse
      if: success()